services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notification_hub
      POSTGRES_USER: notification_hub
      POSTGRES_PASSWORD: notification_hub
    ports:
      - '5432:5432'
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U notification_hub -d notification_hub']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-dev-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-dev-data:
  redis-dev-data:
