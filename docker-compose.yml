services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notification_hub
      POSTGRES_USER: notification_hub
      POSTGRES_PASSWORD: notification_hub
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U notification_hub -d notification_hub']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: builder
    command: npm run prisma:deploy
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://notification_hub:notification_hub@postgres:5432/notification_hub

  api:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_NAME: NotificationHub
      APP_VERSION: 1.0.0
      DATABASE_URL: postgresql://notification_hub:notification_hub@postgres:5432/notification_hub
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_me_to_a_long_random_secret_32_chars
      CORS_ORIGIN: http://localhost:3000
    ports:
      - '3000:3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3000/api/v1/health/ready'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  postgres-data:
  redis-data:
